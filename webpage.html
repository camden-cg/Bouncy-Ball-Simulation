<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncy ball energy simulation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f7f7f5;
    --bg-tertiary: #f0efec;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9b9b96;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --teal: #1D9E75;
    --amber: #BA7517;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text: #f0efe9;
      --text-secondary: #9b9b96;
      --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --blue-bg: #0c2540;
      --blue-text: #85B7EB;
    }
  }

  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .page {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .page-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .field input[type="number"] {
    width: 100%;
    height: 34px;
    padding: 0 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input[type="number"]:focus {
    border-color: var(--blue);
  }

  .toggle-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .toggle-group label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .toggle-row {
    display: flex;
    gap: 8px;
  }

  .toggle-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 34px;
    padding: 0 12px;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    user-select: none;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }

  .toggle-pill input { display: none; }

  .toggle-pill:has(input:checked) {
    background: var(--blue-bg);
    color: var(--blue-text);
    border-color: var(--blue);
  }

  .pip {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .toggle-pill:has(input:checked) .pip { opacity: 1; }

  .main-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .sim-col {
    flex: 2;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .side-col {
    flex: 1;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sim-box {
    position: relative;
    height: 380px;
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }

  #ball {
    width: 24px;
    height: 24px;
    background: var(--blue);
    border-radius: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: grab;
    will-change: top, left;
    z-index: 2;
  }

  #ball:active { cursor: grabbing; }

  .ghost-ball {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--blue);
    position: absolute;
    transform: translate(-50%, -50%);
    opacity: 0.14;
    pointer-events: none;
    transition: opacity 3s ease;
    z-index: 1;
  }

  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1.5px;
    background: var(--blue);
    opacity: 0.2;
  }

  .height-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-variant-numeric: tabular-nums;
  }

  .transport {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .t-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.1s, color 0.1s;
    flex-shrink: 0;
  }

  .t-btn:hover { background: var(--bg-tertiary); color: var(--text); }

  .t-btn svg { width: 15px; height: 15px; fill: currentColor; }

  #play-btn {
    background: var(--blue-bg);
    border-color: var(--blue);
    color: var(--blue-text);
  }

  #play-btn:hover { background: #cfe3f6; }

  .speed-group {
    display: flex;
    gap: 4px;
    margin-left: 4px;
  }

  .speed-btn {
    height: 34px;
    padding: 0 10px;
    font-size: 12px;
    font-family: inherit;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.1s, color 0.1s;
    font-variant-numeric: tabular-nums;
  }

  .speed-btn:hover { background: var(--bg-tertiary); color: var(--text); }
  .speed-btn.active { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); }

  #reset-btn { margin-left: auto; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-cell {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }

  .stat-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .stat-unit {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
    margin-left: 2px;
  }

  .energy-bars {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .e-row { display: flex; flex-direction: column; gap: 5px; }

  .e-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .e-name { font-size: 12px; color: var(--text-secondary); }
  .e-value { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  .e-track {
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    overflow: hidden;
  }

  .e-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.04s linear;
  }

  #pe-fill { background: var(--blue); }
  #ke-fill { background: var(--teal); }
  #th-fill { background: var(--amber); }

  .graph-wrap {
    border-top: 0.5px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
  }

  canvas#graph {
    width: 100%;
    height: 100px;
    display: block;
    border-radius: var(--radius-md);
  }

  .legend {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .main-row { flex-direction: column; }
    .side-col { min-width: 0; }
    .controls-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="page">

  <div style="display:flex; align-items:center; justify-content:space-between; padding: 0 2px;">
    <span class="page-title">Bouncy ball energy simulation</span>
  </div>

  <div class="card">
    <div class="section-label">Parameters</div>
    <div class="controls-grid">
      <div class="field">
        <label>Drop height (cm)</label>
        <input type="number" id="heightInput" value="200" min="10" max="1000">
      </div>
      <div class="field">
        <label>Gravity (cm/s²)</label>
        <input type="number" id="gravityInput" value="980" min="1" max="5000">
      </div>
      <div class="field">
        <label>Mass (kg)</label>
        <input type="number" id="massInput" value="1" min="0.1" max="100" step="0.1">
      </div>
      <div class="field">
        <label>Bounciness</label>
        <input type="number" id="bounceInput" value="0.8" min="0.05" max="1" step="0.05">
      </div>
      <div class="field">
        <label>Ghost trail (s)</label>
        <input type="number" id="ghostFreqInput" value="0.05" min="0.05" max="5" step="0.05">
      </div>
      <div class="toggle-group">
        <label>Options</label>
        <div class="toggle-row">
          <label class="toggle-pill">
            <input type="checkbox" id="frictionToggle" checked>
            <span class="pip"></span> Friction
          </label>
          <label class="toggle-pill">
            <input type="checkbox" id="dragToggle" checked>
            <span class="pip"></span> Drag
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="main-row">

    <div class="sim-col">
      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="sim-box" id="box">
          <div class="ground"></div>
          <div class="height-badge" id="height-label">200 cm</div>
          <div id="ball"></div>
        </div>
      </div>

      <div class="card" style="padding: 10px 14px;">
        <div class="transport">
          <div class="t-btn" id="rewind-btn" title="Step back">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </div>
          <div class="t-btn" id="play-btn" title="Play / Pause">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </div>
          <div class="t-btn" id="forward-btn" title="Step forward">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-6 6 4.32V7.68L8 12zm8-7h2v12h-2z"/></svg>
          </div>
          <div class="speed-group">
            <button class="speed-btn" data-speed="0.25">¼×</button>
            <button class="speed-btn" data-speed="0.5">½×</button>
            <button class="speed-btn active" data-speed="1">1×</button>
            <button class="speed-btn" data-speed="2">2×</button>
          </div>
          <div class="t-btn" id="reset-btn" title="Reset">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
          </div>
        </div>
      </div>
    </div>

    <div class="side-col">

      <div class="card">
        <div class="section-label">Live readout</div>
        <div class="stats-grid">
          <div class="stat-cell">
            <div class="stat-label">Height</div>
            <div class="stat-val"><span id="sv-h">200</span><span class="stat-unit">cm</span></div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Speed</div>
            <div class="stat-val"><span id="sv-v">0</span><span class="stat-unit">cm/s</span></div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Total E</div>
            <div class="stat-val"><span id="sv-total">0.0</span><span class="stat-unit">J</span></div>
          </div>
          <div class="stat-cell">
            <div class="stat-label">Thermal</div>
            <div class="stat-val"><span id="sv-th">0.0</span><span class="stat-unit">J</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-label">Energy breakdown</div>
        <div class="energy-bars">
          <div class="e-row">
            <div class="e-header">
              <span class="e-name">Potential (PE)</span>
              <span class="e-value" id="pe-val">0.0 J</span>
            </div>
            <div class="e-track"><div class="e-fill" id="pe-fill" style="width:100%"></div></div>
          </div>
          <div class="e-row">
            <div class="e-header">
              <span class="e-name">Kinetic (KE)</span>
              <span class="e-value" id="ke-val">0.0 J</span>
            </div>
            <div class="e-track"><div class="e-fill" id="ke-fill" style="width:0%"></div></div>
          </div>
          <div class="e-row">
            <div class="e-header">
              <span class="e-name">Thermal (TH)</span>
              <span class="e-value" id="th-val">0.0 J</span>
            </div>
            <div class="e-track"><div class="e-fill" id="th-fill" style="width:0%"></div></div>
          </div>
        </div>

        <div class="graph-wrap">
          <canvas id="graph" width="200" height="100"></canvas>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>PE</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>KE</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>TH</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  const boxEl   = document.getElementById('box');
  const ballEl  = document.getElementById('ball');
  const hlabel  = document.getElementById('height-label');
  const graphEl = document.getElementById('graph');
  const ctx     = graphEl.getContext('2d');

  let g = 980, m = 1, bounce = 0.8, startH = 200;
  let ghostFreq = 0.25;
  let useFriction = true, useDrag = true;
  let y = 0, v = 0, thermal = 0;
  let playing = true, speed = 1, dragging = false;
  let history = [], hIndex = 0;
  let lastGhostT = 0, lastT = null;
  let ghosts = [];

  function readParams() {
    startH    = Math.max(10,   +document.getElementById('heightInput').value   || 200);
    g         = Math.max(1,    +document.getElementById('gravityInput').value  || 980);
    m         = Math.max(0.01, +document.getElementById('massInput').value     || 1);
    bounce    = Math.min(1, Math.max(0.05, +document.getElementById('bounceInput').value || 0.8));
    ghostFreq = Math.max(0.05, +document.getElementById('ghostFreqInput').value || 0.25);
    useFriction = document.getElementById('frictionToggle').checked;
    useDrag     = document.getElementById('dragToggle').checked;
  }

  ['heightInput','gravityInput','massInput','bounceInput','ghostFreqInput'].forEach(id =>
    document.getElementById(id).addEventListener('input', readParams)
  );
  document.getElementById('frictionToggle').addEventListener('change', readParams);
  document.getElementById('dragToggle').addEventListener('change', readParams);

  function clearGhosts() {
    ghosts.forEach(g => g.remove());
    ghosts = [];
  }

  function reset() {
    readParams();
    y = startH; v = 0; thermal = 0;
    history = []; hIndex = 0;
    lastGhostT = 0; lastT = null;
    clearGhosts();
    ctx.clearRect(0, 0, graphEl.width, graphEl.height);
    setPlaying(true);
  }

  function setPlaying(val) {
    playing = val;
    document.getElementById('play-icon').innerHTML = playing
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
    if (playing) lastT = null;
  }

  document.getElementById('play-btn').addEventListener('click', () => setPlaying(!playing));
  document.getElementById('reset-btn').addEventListener('click', reset);

  document.getElementById('rewind-btn').addEventListener('click', () => {
    if (playing) return;
    hIndex = Math.max(0, hIndex - 6);
    restoreState(history[hIndex]);
  });

  document.getElementById('forward-btn').addEventListener('click', () => {
    if (playing) return;
    hIndex = Math.min(history.length - 1, hIndex + 6);
    restoreState(history[hIndex]);
  });

  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      speed = parseFloat(btn.dataset.speed);
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  function restoreState(s) {
    if (!s) return;
    y = s.y; v = s.v; thermal = s.th * 10000;
    renderBall();
    updateUI(s.pe, s.ke, s.th);
  }

  function boxH() { return boxEl.clientHeight; }
  function boxW() { return boxEl.clientWidth; }

  function pxY() {
    const h = boxH();
    const scale = (h - 28) / startH;
    return h - Math.min(Math.max(y, 0), startH) * scale - 14;
  }

  function renderBall() {
    ballEl.style.left = (boxW() / 2) + 'px';
    ballEl.style.top  = pxY() + 'px';
    hlabel.textContent = y.toFixed(0) + ' cm';
  }

  function addGhost(t) {
    if (t - lastGhostT < ghostFreq * 1000) return;
    lastGhostT = t;
    const g = document.createElement('div');
    g.className = 'ghost-ball';
    g.style.left = ballEl.style.left;
    g.style.top  = ballEl.style.top;
    boxEl.appendChild(g);
    ghosts.push(g);
    requestAnimationFrame(() => { g.style.opacity = '0'; });
    setTimeout(() => { g.remove(); ghosts = ghosts.filter(x => x !== g); }, 3500);
    if (ghosts.length > 40) ghosts.shift().remove();
  }

  function step(dt) {
    dt = Math.min(dt, 0.05) * speed;

    v += g * dt;

    if (useDrag) {
      const drag = 0.0003 * v * Math.abs(v);
      thermal += Math.abs(drag * v * dt);
      v -= drag * dt;
    }

    y -= v * dt;

    if (y <= 0) {
      y = 0;
      if (useFriction) {
        thermal += 0.5 * m * v * v * (1 - bounce * bounce);
        v = -v * bounce;
      } else {
        v = -Math.abs(v);
      }
      if (Math.abs(v) < 1.5) v = 0;
    }

    if (y > startH) { y = startH; if (v < 0) v = 0; }
  }

  function updateUI(pe, ke, th) {
    const total = pe + ke + th || 1;
    const pct = x => Math.min(100, Math.max(0, x / total * 100)).toFixed(1) + '%';
    const fmt = x => x.toFixed(1);

    document.getElementById('pe-fill').style.width = pct(pe);
    document.getElementById('ke-fill').style.width = pct(ke);
    document.getElementById('th-fill').style.width = pct(th);
    document.getElementById('pe-val').textContent = fmt(pe) + ' J';
    document.getElementById('ke-val').textContent = fmt(ke) + ' J';
    document.getElementById('th-val').textContent = fmt(th) + ' J';
    document.getElementById('sv-h').textContent   = y.toFixed(0);
    document.getElementById('sv-v').textContent   = Math.abs(v).toFixed(0);
    document.getElementById('sv-total').textContent = fmt(pe + ke + th);
    document.getElementById('sv-th').textContent  = fmt(th);
  }

  function drawGraph() {
    const W = graphEl.width, H = graphEl.height;
    ctx.clearRect(0, 0, W, H);
    if (!history.length) return;

    const maxE = history.reduce((a, s) => Math.max(a, s.pe + s.ke + s.th), 0.001);
    const n = history.length;
    const colors = ['#378ADD', '#1D9E75', '#BA7517'];
    const keys   = ['pe', 'ke', 'th'];

    keys.forEach((k, i) => {
      ctx.beginPath();
      ctx.strokeStyle = colors[i];
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      history.forEach((s, j) => {
        const px = j / (n - 1 || 1) * W;
        const py = H - (s[k] / maxE) * (H - 4) - 2;
        j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.stroke();
    });
  }

  function loop(t) {
    requestAnimationFrame(loop);
    if (!lastT) { lastT = t; return; }
    const raw = (t - lastT) / 1000;
    lastT = t;

    if (playing && !dragging) {
      step(raw);
      addGhost(t);
    }

    const pe = m * g * y       / 10000;
    const ke = 0.5 * m * v * v / 10000;
    const th = thermal          / 10000;

    renderBall();

    history.push({ y, v, pe, ke, th });
    if (history.length > 500) history.shift();
    hIndex = history.length - 1;

    updateUI(pe, ke, th);
    drawGraph();
  }

  ballEl.addEventListener('mousedown',  e => { dragging = true; e.preventDefault(); });
  ballEl.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, { passive: false });

  document.addEventListener('mouseup',  () => { if (dragging) { dragging = false; lastT = null; } });
  document.addEventListener('touchend', () => { if (dragging) { dragging = false; lastT = null; } });

  function dragMove(clientY) {
    const r = boxEl.getBoundingClientRect();
    const scale = startH / (r.height - 28);
    y = Math.max(0, Math.min(startH, (r.height - (clientY - r.top)) * scale));
    v = 0;
    renderBall();
  }

  document.addEventListener('mousemove', e => { if (dragging) dragMove(e.clientY); });
  document.addEventListener('touchmove', e => { if (dragging) dragMove(e.touches[0].clientY); }, { passive: true });

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
